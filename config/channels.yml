version: 1
default_channel: quantization

channels:
  quantization:
    description: LLM quantization, low-bit compression, KV cache compression, multimodal quantization, runtime/kernel integration.
    topics: config/channels/quantization/topics.yml
    research_map: references/channels/quantization-map.md
    outputs:
      radar: outputs/quantization/radar

  ai-infra:
    description: LLM infrastructure, serving/runtime, training systems, MoE, communication, kernels, hardware affinity and performance analysis.
    topics: config/channels/ai-infra/topics.yml
    research_map: references/channels/ai-infra-map.md
    outputs:
      radar: outputs/ai-infra/radar
