version: 1
default_channel: quantization
watchlist: config/watchlist.yml
tracked_repos: config/tracked-repos.yml
experts: config/experts.yml
venues: config/venues.yml

channels:
  quantization:
    description: LLM quantization, low-bit compression, KV cache compression, multimodal quantization, runtime/kernel integration.
    profile: config/channels/quantization/profile.yml
    topics_full: config/channels/quantization/topics.full.yml
    research_map: references/channels/quantization-map.md
    template: templates/radar-result-quantization.md
    digest_template: templates/radar-digest-quantization.md
    outputs:
      radar: outputs/quantization/radar
      digest: outputs/quantization/digest

  ai-infra:
    description: LLM infrastructure, serving/runtime, training systems, MoE, communication, kernels, hardware affinity and performance analysis.
    profile: config/channels/ai-infra/profile.yml
    topics_full: config/channels/ai-infra/topics.full.yml
    research_map: references/channels/ai-infra-map.md
    template: templates/radar-result-ai-infra.md
    digest_template: templates/radar-digest-ai-infra.md
    outputs:
      radar: outputs/ai-infra/radar
      digest: outputs/ai-infra/digest
