  - name: DeepSeek
    organization: DeepSeek
    aliases:
      - DeepSeek
      - DeepSeek-V
      - DeepSeek-R
      - DeepSeek-MoE
    watch_for:
      - MoE architecture
      - MLA / attention architecture
      - training or inference system detail
