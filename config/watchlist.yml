frameworks:
  - vLLM
  - SGLang
  - TensorRT-LLM
  - llama.cpp
  - Transformers
  - FlashInfer
  - Triton

keep_release_if_any:
  - agent product release or changelog
  - coding agent capability change
  - tool-use, browser-use, computer-use or connector update
  - IDE, CLI, GitHub or repo automation integration
  - architecture detail
  - context length change
  - tokenizer or model card change
  - open weights or license change
  - quantized checkpoint or low-bit artifact
  - vLLM / SGLang / TensorRT-LLM / llama.cpp support
  - benchmark with latency, throughput, memory, accuracy or cost
  - kernel, KV cache, MoE, speculative decoding or batching detail

drop_release_if:
  - pure marketing announcement
  - no model card, release note, artifact, benchmark or technical detail
  - only generic capability claims
  - no relation to quantization, AI infra, serving/runtime, model deployment, coding agents or research agents
