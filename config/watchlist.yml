version: 1
purpose: >
  High-priority model families, agent products, organizations, frameworks and
  keywords to watch across shared sources. This is not a source list; it tells
  radar who deserves extra attention in weekly scans.

default_read: true
read_when:
  - every regular weekly radar run
  - source_scope includes model_releases, framework_releases or vendor_blogs
  - user asks about model releases, agent products, official updates, model cards or release notes
  - a candidate mentions one of the watched entities

search_policy:
  use_as_query_expansion: true
  max_entities_per_run: 12
  prefer:
    - official release notes
    - official blogs or changelogs
    - model cards
    - GitHub releases
    - docs pages with versioned updates
  notes:
    - Use watchlist terms to expand weekly search queries, not only as a post-filter.
    - Do not force every watched entity into the final report; report only high-signal changes.

model_families:
  - name: GPT / ChatGPT
    organization: OpenAI
    aliases:
      - GPT
      - ChatGPT
      - OpenAI model
    watch_for:
      - new model version
      - context length
      - multimodal capability
      - API/runtime behavior
      - pricing or throughput signal
      - structured output / tool-use implications

  - name: Claude
    organization: Anthropic
    aliases:
      - Claude
      - Claude Code
    watch_for:
