version: 1
scope_note: >
  固定研究范围：LLM quantization、低 bit 压缩、推理优化、
  多模态/全模态模型量化、serving/runtime 集成，以及算子/kernel 相关工作。
  这里不是金融量化研究。

core_topics:
  low_bit_quantization:
    description: 低 bit 量化、权重量化、激活量化、浮点格式和模型压缩。
    include:
      - quantization
      - low-bit
      - low bit
      - INT8
      - INT4
      - FP8
      - NF4
      - MXFP4
      - NVFP4
      - FP4
      - microscaling
      - micro-scaling
      - 1-bit
      - 2-bit
      - binary LLM
      - ternary LLM
      - weight-only quantization
      - weight quantization
      - weights quantization
      - activation quantization
      - activations quantization
      - weight activation quantization
      - weight-activation quantization
      - W4A16
      - W4A8
      - W8A8
    synonyms:
      - compression
      - model compression
      - post-training quantization
      - quantization-aware training
      - PTQ
      - QAT
      - quant-aware training

  quantization_aware_training:
    description: QAT、低 bit 训练和训练期量化适配。
    include:
      - quantization-aware training
      - quant aware training
      - QAT
      - fake quantization
      - fake quant
      - straight-through estimator
      - STE
      - low-bit training
      - quantized training
    synonyms:
      - train-time quantization
      - training-aware quantization

  optimizer_quantization:
    description: 优化器状态、梯度、momentum/variance 和低 bit optimizer 相关量化。
    include:
      - optimizer quantization
      - quantized optimizer
      - low-bit optimizer
      - 8-bit optimizer
      - 4-bit optimizer
      - optimizer state quantization
      - optimizer states quantization
      - gradient quantization
      - gradient compression
      - momentum quantization
      - variance quantization
      - Adam state quantization
      - Adam optimizer quantization
      - 8-bit Adam
      - 4-bit Adam
      - bitsandbytes optimizer
      - memory efficient optimizer
    synonyms:
      - low-bit optimizer states
      - quantized optimizer states
      - optimizer state compression

  kv_cache_and_long_context:
    description: KV cache 量化、长上下文推理和 attention cache 压缩。
    include:
      - KV cache quantization
      - key value cache
      - long context
      - context length
      - paged attention
      - attention cache
      - memory efficient attention
    synonyms:
      - cache compression
      - KV compression

  kv_cache_non_quant_compression:
    description: KV cache 的非量化压缩方向，包括稀疏、剪枝、驱逐、合并、低秩和长上下文 cache policy。
    include:
      - KV cache compression
      - KV cache sparsity
      - sparse KV cache
      - KV cache pruning
      - KV cache eviction
      - KV cache dropping
      - KV cache merging
      - KV cache selection
      - KV cache low-rank
      - key cache compression
      - value cache compression
      - attention cache compression
      - attention sparsity
      - sparse attention
      - token pruning
      - token merging
      - token eviction
      - context pruning
      - context compression
      - streaming attention
      - attention sink
      - heavy hitter tokens
      - H2O
      - SnapKV
      - PyramidKV
      - StreamingLLM
      - LongLLMLingua
    synonyms:
      - non-quantized KV compression
      - non-quant KV compression
      - cache eviction policy
      - long-context compression

  long_context_mechanisms_for_compression:
    description: 长上下文、位置编码、attention/residual sink 等机制对 KV cache 压缩、量化和 serving 的影响。它是相邻机制/挑战标签，不是独立的 KV 主方向。
    include:
      - attention sink
      - attention sinks
      - residual sink
      - residual sinks
      - residual stream
      - sink token
      - sink tokens
      - heavy hitter token
      - heavy hitter tokens
      - attention concentration
      - long-context behavior
      - long context behavior
      - RoPE
      - rotary position embedding
      - rotary position embeddings
      - position interpolation
      - positional extrapolation
      - position encoding
      - positional encoding
      - context extrapolation
      - streaming attention
    synonyms:
      - sink mechanism
      - long-context mechanism
      - position mechanism
      - compression-relevant mechanism
    require_any_context:
      - quantization
      - low-bit
      - compression
      - KV cache
      - cache compression
      - cache eviction
      - sparsity
      - pruning
      - long context
      - serving
      - inference
      - memory
      - activation
      - outlier

  serving_and_runtime:
    description: 推理服务、runtime、吞吐/延迟优化和 serving-aware quantization。
    include:
      - vLLM
      - SGLang
      - TensorRT-LLM
      - llama.cpp
      - serving
      - inference server
      - throughput
      - latency
      - batch decoding
      - speculative decoding
      - continuous batching
    synonyms:
      - runtime
      - deployment
      - inference optimization

  kernels_and_operators:
    description: CUDA/Triton kernel、算子融合、packing layout 和访存优化。
    include:
      - CUDA kernel
      - Triton kernel
      - operator fusion
      - fused kernel
      - GEMM
      - matmul
      - packing layout
      - dequantization
      - memory bandwidth
      - tensor core
    synonyms:
      - custom op
      - custom operator
      - kernel optimization

  rotation_and_transform_quantization:
    description: 旋转/变换类量化，包括 Hadamard、正交变换、outlier smoothing 和 QuaRot/SmoothQuant 类方法。
    include:
      - rotation quantization
      - rotational quantization
      - orthogonal transformation
      - orthogonal transform
      - Hadamard transform
      - randomized Hadamard
      - QuaRot
      - SpinQuant
      - SmoothQuant
      - outlier smoothing
      - outlier suppression
      - activation outlier
      - weight rotation
      - activation rotation
    synonyms:
      - rotation-based quantization
      - transform-based quantization
      - outlier-aware quantization

  balanced_and_outlier_aware_quantization:
    description: 平衡量化和异常值感知量化，通过缩放、重分布、迁移或抑制 outlier，让权重/激活分布更适合低 bit 表示。
    include:
      - balanced quantization
      - balancing quantization
      - outlier-aware quantization
      - outlier aware quantization
      - outlier balancing
      - outlier migration
      - outlier smoothing
      - outlier suppression
      - activation smoothing
      - activation scaling
      - channel scaling
      - equivalent transformation
      - equalization
      - weight equalization
      - activation equalization
      - SmoothQuant
      - AWQ
      - OmniQuant
    synonyms:
