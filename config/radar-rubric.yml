version: 1
scale: 0_to_5
purpose: >
  用于 radar 工作流的快速初筛。只基于搜索阶段通常能看到的信息：
  标题、摘要、项目说明、是否开源、初步效果和更新时间。
  不要在 radar 阶段强行判断算子细节、完整实验扎实度或模型覆盖深度。

prefilter_gates:
  scope_match:
    required: true
    source: config/channels/<channel>/topics.yml
    pass: 标题、摘要、README 或项目描述命中频道配置中的主题、同义词或明确相关系统方向。
    fail: 明显是金融量化、量子计算、纯图像/视频 codec 量化、泛 compression，或只是在无关语境里提到 quantization。
    note: 相关性是进入 radar 评分前的过滤条件，不参与排序加权。

dimensions:
  summary_quality:
    weight: 1.2
    high: 摘要或项目 README 能清楚说明问题、方法、收益和关键证据，技术信息量足够。
    low: 摘要或 README 含糊、营销味重，或看不出具体技术贡献。

  open_source_signal:
    weight: 1.0
    high: 有论文关联代码、可运行仓库、实现细节、配置或 benchmark。
    low: 没有代码，或仓库空泛、不可运行、只放 README。

  reported_effect:
    weight: 1.2
    high: 明确报告困惑度、精度、吞吐、延迟、显存、压缩率等关键效果，并有对比对象。
    low: 只说有效，没有可判断的指标或 baseline。

  practical_value_guess:
    weight: 1.3
    high: 初看就可能用于推理、训练、finetuning、serving、长上下文、边缘部署、MoE、多模态推理或全模态模型场景。
    low: 很难连接到真实 LLM 量化或部署需求。

  freshness_and_activity:
    weight: 0.6
    high: 近期发布/更新，或仓库仍活跃维护。
    low: 明显过时，或长期无维护且无经典价值。

  noise_risk:
    weight: -0.8
    high: 金融量化、量子计算、纯图像量化、标题党、过度宣传、无证据 benchmark。
    low: 范围清晰，证据可信。

recommendation_guidance:
  deep-read: 已通过主题过滤，摘要/README 的技术信息量高，并且效果或实用价值至少有一个强信号。
  track-code: 开源实现或 runtime 集成是主要价值，值得后续看代码。
  skim: 有一定价值但证据不够强，只值得快速浏览。
  watch: 有潜力但缺代码、缺指标或还不成熟。
  ignore: 未通过主题过滤、低信号或高噪音。
