version: 1
purpose: >
  GitHub repositories that deserve direct release or activity tracking. This
  file owns concrete repo identities; sources.yml owns source types and API
  behavior.

default_read: true
read_when:
  - source_scope includes github_releases, github_activity, framework_releases or repo_activity
  - user asks about framework releases, repo activity, kernels, runtimes or training systems
  - a watched framework, runtime or kernel project needs direct GitHub evidence

usage_policy:
  use_source_modes:
    - github_releases
    - github_activity
  channel_filter: use repos whose channels include the current channel
  not_a_retention_gate: true
  notes:
    - Repo activity is evidence, not an automatic reason to include an item.
    - Keep each repository here once; use source_modes to decide whether to scan releases, activity, or both.
    - If a repository is also an important entity, it may appear in watchlist.yml as a framework or organization signal.

repositories:
  - name: vLLM
    repo: vllm-project/vllm
    channels:
      - quantization
      - ai-infra
    source_modes:
      - github_releases
      - github_activity
    tags:
      - serving-runtime
      - scheduler
      - kv-cache
      - speculative-decoding
      - quantization

